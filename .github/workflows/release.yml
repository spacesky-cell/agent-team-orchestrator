name: Release artifacts

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: python -m pip install -e "packages/core[dev]"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify
      - run: bash scripts/e2e/cold-install.sh
      - run: mkdir -p release-artifacts/python release-artifacts/npm
      - run: python -m build packages/core --outdir release-artifacts/python
      - run: node scripts/release/prepare-npm-runtime.mjs release-artifacts/python vendor
      - run: cd packages/shared && pnpm pack --pack-destination ../../release-artifacts/npm
      - run: cd packages/cli && pnpm pack --pack-destination ../../release-artifacts/npm
      - run: cd packages/mcp-server && pnpm pack --pack-destination ../../release-artifacts/npm
      - run: pnpm pack --pack-destination release-artifacts/npm
      - run: node scripts/release/build-manifest.mjs release-artifacts/python release-artifacts/npm release-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            release-artifacts/python/*
            release-artifacts/npm/*
            release-manifest.json
