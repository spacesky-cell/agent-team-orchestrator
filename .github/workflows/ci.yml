name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "packages/core[dev]"
      - run: python -m black --check packages/core/src packages/core/tests
      - run: python -m ruff check packages/core/src packages/core/tests
      - run: python -m mypy packages/core/src
      - run: python -m pytest packages/core/tests -q --cov=ato_core --cov-fail-under=70
      - run: python -m build packages/core

  node:
    name: Node 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @spacesky-cell/ato-shared lint
      - run: pnpm --filter @spacesky-cell/ato-cli lint
      - run: pnpm --filter @spacesky-cell/ato-mcp-server lint
      - run: pnpm --filter @spacesky-cell/ato-shared build
      - run: pnpm --filter @spacesky-cell/ato-shared exec tsc --noEmit
      - run: pnpm --filter @spacesky-cell/ato-cli exec tsc --noEmit
      - run: pnpm --filter @spacesky-cell/ato-mcp-server exec tsc --noEmit
      - run: pnpm exec vitest run --coverage --passWithNoTests
      - run: pnpm run build

  windows-smoke:
    name: Windows smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: python -m pip install -e "packages/core[dev]"
      - run: pnpm install --frozen-lockfile
      - run: python -m pytest packages/core/tests/bridge packages/core/tests/runtime/test_worker_launcher.py -q
      - run: pnpm --filter @spacesky-cell/ato-cli test -- package-entry.test.ts
      - run: pnpm --filter @spacesky-cell/ato-shared test -- python-discovery.test.ts bridge-client.test.ts
