name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.9.0" mypy black
          pip install -e packages/core[dev]

      - name: Run Ruff
        run: ruff check packages/core/src/ --line-length 100

      - name: Run Black (check)
        run: black --check packages/core/src/

      - name: Run MyPy
        run: mypy packages/core/src/ --ignore-missing-imports || true

  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: ./node_modules/.bin/eslint packages/mcp-server/src/ packages/cli/src/

      - name: Type check
        run: ./node_modules/.bin/tsc --noEmit --project packages/mcp-server/tsconfig.json || true

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/core[dev]

      - name: Run tests
        run: pytest packages/core/tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  test-typescript:
    name: Test TypeScript
    runs-on: ubuntu-latest
    needs: lint-typescript
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: ./node_modules/.bin/vitest run --coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-python, lint-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install and build all
        run: |
          npm ci
          npm install -g pnpm
          pnpm run build
          python -m pip install --upgrade pip
          pip install build
          cd packages/core && python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/mcp-server/dist/
            packages/cli/dist/
            packages/core/dist/
