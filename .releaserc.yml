version:
  file: package.json
  path: $.version

changelog:
  files:
    - path: CHANGELOG.md
      lang: en
  sections:
    feat: Features
    fix: Fixes
    docs: Documentation
    refactor: Refactor
    perf: Performance
    test: Tests
    chore: null

commit:
  message: "chore: release v{version}"

tag:
  prefix: v
  sign: false

include:
  - package.json
  - packages/shared/package.json
  - packages/cli/package.json
  - packages/mcp-server/package.json
  - packages/core/package.json
  - packages/core/pyproject.toml
  - packages/core/src/ato_core/__init__.py
  - pnpm-lock.yaml
  - CHANGELOG.md
