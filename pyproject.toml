# Root-level tool configuration only.
#
# The installable Python package source of truth is packages/core/pyproject.toml.
# Use:
#   python -m pip install -e packages/core[dev]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["packages/core/tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
